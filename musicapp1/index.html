<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap');

        html,
        body {
            font-family: "Inter", sans-serif;
            font-optical-sizing: auto;
            font-weight: 400;
            font-style: normal;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at top, #1a1035, #090616);
            color: #fff;
        }

        .outer-sec {
            height: 80vh;
            display: flex;
            padding-top: 0px;
        }

        /* Main Card */
        .music-conatiner {
            width: 300px;
            padding: 25px 20px;
            border-radius: 30px;
            text-align: center;
            background: linear-gradient(180deg, #1a1035, #0c0820);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            overflow: hidden;
            position: relative;
        }

        /* 🎵 Title */
        .title {
            display: inline-block;
            white-space: nowrap;
            animation: marquee 8s linear infinite;
            margin: 0;
        }

        /* Smooth left scroll */
        @keyframes marquee {
            0% {
                transform: translateX(100%);
            }

            100% {
                transform: translateX(-100%);
            }
        }

        .artist {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 35px;
        }

        /* 🎧 Vinyl Style Image */
        .img-conatiner {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        .img-conatiner img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;

            /* Vinyl rings effect */
            box-shadow:
                0 0 0 8px rgba(255, 255, 255, 0.02),
                0 0 0 16px rgba(255, 255, 255, 0.02),
                0 0 0 24px rgba(255, 255, 255, 0.02),
                0 0 40px rgba(168, 85, 247, 0.6);
        }

        /* Glow center dot effect */
        .img-conatiner img::after {
            content: '';
        }

        /* Controls */
        .btn-section {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            margin-top: 20px;
        }

        /* Buttons */
        .btn-section i {
            font-size: 18px;
            color: #bbb;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-section i:hover {
            color: #fff;
            transform: scale(1.2);
        }

        /* Play button (purple glow like image) */
        #play {
            font-size: 22px;
            background: linear-gradient(135deg, #9333ea, #ec4899);
            color: #fff;
            padding: 14px;
            border-radius: 50%;
            box-shadow: 0 0 25px rgba(168, 85, 247, 0.8);
        }

        /* Rotation */
        @keyframes rotateAlbum {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .rotateImg {
            animation: rotateAlbum 6s linear infinite;
        }

        h1 {
            font-size: 36px;
            text-align: center;
            margin-top: 10px;
            background: linear-gradient(90deg, #f60053, #db185a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Animation */
        @keyframes glow {
            from {
                text-shadow: 0 0 10px rgba(255, 106, 0, 0.6),
                    0 0 20px rgba(238, 9, 121, 0.5);
            }

            to {
                text-shadow: 0 0 20px rgba(255, 106, 0, 1),
                    0 0 30px rgba(238, 9, 121, 0.9);
            }
        }

        /* Floating Music Icons */
        .music-icons {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .icon {
            position: absolute;
            font-size: 20px;
            color: #ff0057;
            animation: floatUp 10s linear infinite;
        }

        /* Different positions + delays */
        .i1 {
            left: 10%;
            animation-delay: 0s;
        }

        .i2 {
            left: 30%;
            animation-delay: 3s;
        }

        .i3 {
            left: 60%;
            animation-delay: 6s;
        }

        .i4 {
            left: 80%;
            animation-delay: 2s;
        }

        /* More variations */
        .i5 {
            left: 15%;
            animation-delay: 5s;
            font-size: 18px;
        }

        .i6 {
            left: 25%;
            animation-delay: 8s;
            font-size: 22px;
        }

        .i7 {
            left: 40%;
            animation-delay: 1s;
            font-size: 16px;
        }

        .i8 {
            left: 55%;
            animation-delay: 4s;
            font-size: 20px;
        }

        .i9 {
            left: 70%;
            animation-delay: 7s;
            font-size: 24px;
        }

        .i10 {
            left: 90%;
            animation-delay: 2s;
            font-size: 18px;
        }

        /* Add slight side movement + rotation */
        @keyframes floatUp {
            0% {
                transform: translateY(100vh) translateX(0) rotate(0deg) scale(1);
                opacity: 0;
            }

            20% {
                opacity: 1;
            }

            50% {
                transform: translateY(50vh) translateX(20px) rotate(180deg);
            }

            100% {
                transform: translateY(-10vh) translateX(-20px) rotate(360deg) scale(1.5);
                opacity: 0;
            }
        }

        /* Floating animation */
        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(1);
                opacity: 0;
            }

            20% {
                opacity: 1;
            }

            100% {
                transform: translateY(-10vh) scale(1.5);
                opacity: 0;
            }
        }

        /* 🎵 Music Wave */
        .wave {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 6px;
            height: 40px;
            margin-top: 0px;
        }

        .wave span {
            width: 5px;
            height: 10px;
            border-radius: 10px;
            background: linear-gradient(180deg, #ff00cc, #3333ff);
            animation: waveAnim 1s infinite ease-in-out;
        }

        /* Different delays for natural wave */
        .wave span:nth-child(1) {
            animation-delay: 0s;
        }

        .wave span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .wave span:nth-child(3) {
            animation-delay: 0.4s;
        }

        .wave span:nth-child(4) {
            animation-delay: 0.6s;
        }

        .wave span:nth-child(5) {
            animation-delay: 0.8s;
        }

        @keyframes waveAnim {

            0%,
            100% {
                height: 10px;
                background: linear-gradient(180deg, #ff00cc, #3333ff);
            }

            50% {
                height: 35px;
                background: linear-gradient(180deg, #00f5ff, #ff00cc);
            }
        }

        /* progress bar */
        /* Container */
        .progressbar_container {
            width: 100%;
            max-width: 500px;
            margin: 20px auto;
            font-family: Arial, sans-serif;
        }

        /* Time (0:00 / duration) */
        .progress_duration_meter {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #ccc;
            margin-bottom: 6px;
        }

        /* Progress bar background */
        .progress_div {
            width: 100%;
            height: 6px;
            background: #4d4766;
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        /* Actual progress */
        .progress {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #1db954, #1ed760);
            border-radius: 10px;
            transition: width 0.2s linear;
            width: 0%;
        }
        /* Optional: circle indicator */
        .progress::after {
            content: "";
            position: absolute;
            right: -5px;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            background: #1db954;
            border-radius: 50%;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transition: opacity 0.2s;
        }

      
    </style>
</head>

<body>
    <div class="outer-sec">
        <div class="music-icons">
            <i class="fa-solid fa-music icon i1"></i>
            <i class="fa-solid fa-headphones icon i2"></i>
            <i class="fa-solid fa-compact-disc icon i3"></i>
            <i class="fa-solid fa-music icon i4"></i>
            <i class="fa-solid fa-guitar icon i5"></i>
            <i class="fa-solid fa-drum icon i6"></i>
            <i class="fa-solid fa-radio icon i7"></i>
            <i class="fa-solid fa-wave-square icon i8"></i>
            <i class="fa-solid fa-microphone icon i9"></i>
            <i class="fa-solid fa-music icon i10"></i>

        </div>


        <div class="music-div">
            <div class="wave">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
            </div>

            <h1>Music App</h1>
            <div class="music-conatiner">

                <h2 class="title">Aaoge jab tum sajana...</h2>
                <h3 class="artist">Song by Irshad Kamil</h3>
                <!-- <h4 class="movieName">The Loyalist</h4> -->
                <div class="img-conatiner">
                    <img src="images/1.jpg" alt="" class="test">
                </div>

                <audio src="./songs/1.mp3"></audio>

                <div class="music-controls"></div>

                <!-- progress bar -->
                <div class="progressbar_container" id="progress_container">
                    <div class="progress_duration_meter">
                        <div id="current_time">0.00</div>
                        <div id="duration">0.00</div>
                    </div>

                    <div class="progress_div" id="progress_div">
                        <div class="progress" id="progress"></div>
                    </div>
                </div>

                <div class="btn-section">
                    <i class="fa-solid fa-backward" id="prev" title="Previous"></i>
                    <i class="fa-solid fa-play" id="play" title="Play"></i>
                    <i class="fa-solid fa-forward" id="next" title="Next"></i>

                </div>


            </div>
        </div>
    </div>

    <script>
        const songs = [
            {
                name: "1",

            },
            {

            {

            },
            {
                name: "5",

                artist: 'Sung by Faheem Abdullah'
            },
            {
                name: "6",
                title: 'Ya Ali',
                artist: 'Sung by Zubeen Garg'
            },
            {
                name: "7",
                title: 'Tum Tak ',
                artist: 'Sung by Javed Ali'
            },
            {
                name: "8",
                title: 'Coke Studio',
                artist: 'Sung by Pasoori  Ali Sethi'
            },
            {
                name: "9",
                title: 'Ram Siya Ram',
                artist: 'Sung by Sachet-Parampara'
            },
            {

                title: 'Aaya Re Toofan',
                artist: 'Sung by Sony Music'
            },
            {
                name: "11",
                title: 'Pani Da Rang',
                artist: 'Sung by Ayushmann Khurrana'
            },
            {
                name: "12",
                title: 'Dard Karaara',
                artist: 'Kumar Sanu, Sadhana Sargam'
            },
            {
                name: "13",
                title: 'Tu Hi Meri Shab Hai',
                artist: 'Sung by K.K'
            },
            {
                name: "14",
                title: 'Nashe Si Chadh Gayi',
                artist: 'Sung by Arijit Singh,'
            },
            {
                name: "15",
                title: 'Oo Antava Mawa..Oo Oo Antava',
                artist: 'Sung by Aditya Music'
            },
            {
                name: "16",
                title: 'Tere Liye',
                artist: 'Sung by Atif Aslam'
            },
            {
                name: "17",
                title: 'Tum Se Hi',
                artist: 'Sung by Pritam and Mohit Chauhan'
            },
            {
                name: "18",
                title: 'Zara Sa',
                artist: 'Sung by Sony'
            },
            {
                name: "19",
                title: 'Dil Sambhal Ja Zara Phir Mohabbat',
                artist: 'Sung by Ohd Irfan, Arjit, Salim Bhat'
            },
            {
                name: "20",
                title: 'Saiyaara Title Song',
                artist: 'Sung by Ahaan Panday, Aneet Padda  Tanishk Bagchi'
            },
            {
                name: "21",
                title: 'Na To Karvan Ki Talash Hai',
                artist: 'Sung by  Shashwat Sachdev, Shahzad Ali'
            },
            {
                name: "22",
                title: 'Gehra Hua',
                artist: 'Sung by SachdevArijit Singh'
            },
            {
                name: "23",
                title: 'Afghan Jalebi',
                artist: 'Sung by Pritam and Akhtar Chanal Zahri'
            },

        ];

        //JS CODE
        const music = document.querySelector('audio');
        const play = document.querySelector('#play');
        const myImage = document.querySelector('.test');

        const title = document.querySelector('.title');
        //const movieName = document.querySelector('.movieName');

        const artist = document.querySelector('.artist');
        const next = document.querySelector('#next');
        const prev = document.querySelector('#prev');

        let progress = document.getElementById('progress');
        let current_time = document.getElementById('current_time');
        let ketan_duration = document.getElementById('duration');
        let progress_div = document.getElementById('progress_div');






        let isPlaying = false;
        //Play
        let playMusic = () => {
            isPlaying = true;
            music.play();
            play.classList.replace('fa-play', 'fa-pause');
            myImage.classList.add('rotateImg');
        };

        //Pause
        let pauseMusic = () => {
            isPlaying = false;
            music.pause();
            play.classList.replace('fa-pause', 'fa-play');
            myImage.classList.remove('rotateImg');
        };

        play.addEventListener('click', () => {
            // if (isPlaying) {
            //     pauseMusic();
            // }
            // else {
            //     playMusic();
            // }

            isPlaying ? pauseMusic() : playMusic()
        });

        let songIndex = 0; //start song Array Number

        const loadSong = (songs) => {
            //movieName.textContent = songs.name;
            title.textContent = songs.title;
            artist.textContent = songs.artist;
            music.src = "songs/" + songs.name + ".mp3";
            myImage.src = "images/" + songs.name + ".jpg";
        }

        //loadSong(songs[songIndex]); //load song by array index [0]

        const nextSong = () => {
            songIndex = (songIndex + 1) % songs.length;
            loadSong(songs[songIndex]); //load song by array index [0]
            playMusic();
        }

        const prevSong = () => {
            songIndex = (songIndex - 1 + songs.length) % songs.length;
            loadSong(songs[songIndex]); //load song by array index [0]
            playMusic();
        }

        //progress bar code
        music.addEventListener('timeupdate', (event) => {
            //console.log(event); //currenttime, duration from event

            //object destructuring, srcElement taken from event 
            //calculate duration(%) of Song: (currentTime/TotalTime)*100;
            const {currentTime, duration} = event.srcElement;
            //console.log(currentTime);
            //console.log(duration);
            let progress_time = (currentTime / duration) * 100;
            progress.style.width  = `${progress_time}%`; 

            let min_duration = Math.floor(duration / 60);
            let sec_duration = Math.floor(duration % 60);
            let total_duration = `${min_duration} : ${sec_duration}`;
            if(duration){
                ketan_duration.textContent = `${min_duration} : ${sec_duration}`;
            }
            

            //current time
            let min_currentTime = Math.floor(currentTime / 60);
            let sec_currentTime = Math.floor(currentTime % 60);
            if(sec_currentTime < 10){
                sec_currentTime = `0${sec_currentTime}`;
            }
            let total_currentTime = `${min_currentTime} : ${sec_currentTime}`;
            current_time.textContent = `${total_currentTime}`;
        });

        // Click on progress bar to seek
        progress_div.addEventListener('click', (e) => {
           // console.log(e);          
           let {clientWidth, offsetX} = e.srcElement;

           console.log(clientWidth);
           console.log(e.offsetX);

           //on click prgress bar get value in seconds.
           music.demo = Math.floor((e.offsetX / e.currentTarget.clientWidth) * music.duration);
           //console.log(music.currentTime); // exact seconds

           //currentTime is a built-in property of the HTML <audio> element:
           music.currentTime = music.demo;


        });


        next.addEventListener('click', nextSong);
        prev.addEventListener('click', prevSong);


    </script>
</body>

</html>
