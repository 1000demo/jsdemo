<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jokes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea, #c790ff);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .outer {
            display: flex;
            flex-direction: column;
            gap: 30px;
            /* controls vertical spacing */


            justify-content: center;
            align-items: center;
            width: 30%;
            margin: 0 auto;
            text-align: center;
        }

        .container {
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            width: 400px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        h1 {
            margin-bottom: 0px;
            color: #fff;
        }

        .api_body {
            min-height: 80px;
            padding: 15px;
            background: #f4f4f4;
            border-radius: 10px;
            color: #ff003f;
            font-size: 16px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background: #ff003f;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            min-width: 30%;
            margin: 0 auto;
        }



        section {
            width: 100%;
            max-width: 100%;
            margin: 0 auto;

        }
    </style>
</head>

<body>
    <div class="outer">
        <h1>Welcome to Dad Jokes!</h1>
        <section class="api_body"></section>
        <button id="fetchJoke">Get Another Joke</button>


    </div>
    <script>
        const apiBody = document.querySelector('.api_body');
        const apiUrl = 'https://icanhazdadjoke.com/'; //API
        //const apiUrl = 'https://jsonplaceholder.typicode.com/posts/1';
        /* Using promices
        
        const fetchData = () => {
            fetch(apiUrl, {
                headers: {
                    Accept: 'application/json'
                },
            })
                .then((res) => {
                    console.log(res);
                    return res.json(); //converted
                })
                .then((data) => {
                    console.log(data.joke);
                    apiBody.innerHTML = data.joke;
                })
                .catch((error) => {
                    console.log(error);
                });
        }
        fetchData(); 
        document.getElementById('fetchJoke').addEventListener('click', fetchData);
        */


        //Using Asynk await (90% Used this)


        //async function fetchData() {
            //arrow function
        const fetchData  = async () => {
            try {
                const res = await fetch(apiUrl, {
                    headers: {
                        Accept: "application/json",
                    },
                });
                const data = await res.json();
                console.log(data.joke);
                apiBody.innerHTML = data.joke;
            } catch (error) {
                apiBody.innerHTML = error;
                console.log(error);

            }


        }
        fetchData();
        document.getElementById('fetchJoke').addEventListener('click', fetchData);

//if API wrong then  try....catch.... willwork

    </script>
</body>

</html>
