<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stats Section</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;700&family=Barlow+Condensed:wght@700&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #2b3270;
      --accent: #f5a623;
      --icon-color: #c5cae9;
      --label-color: #c5cae9;
      --number-color: #f5a623;
    }

    body {
      background-color: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Barlow', sans-serif;
    }

    .stats-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 80px;
      padding: 60px 40px;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    /* Icons using pure CSS */
    .icon {
      width: 56px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--icon-color);
    }

    .icon svg {
      width: 100%;
      height: 100%;
      fill: var(--icon-color);
    }

    .stat-number {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 3.2rem;
      font-weight: 700;
      color: var(--number-color);
      letter-spacing: 1px;
      line-height: 1;
    }

    .stat-label {
      font-size: 0.9rem;
      font-weight: 400;
      color: var(--label-color);
      letter-spacing: 0.04em;
      text-align: center;
    }

    /* Divider between stats */
    .stat-divider {
      width: 1px;
      height: 80px;
      background: rgba(197, 202, 233, 0.15);
    }

    @media (max-width: 640px) {
      .stats-wrapper {
        flex-direction: column;
        gap: 40px;
      }

      .stat-divider {
        width: 60px;
        height: 1px;
      }
    }
  </style>
</head>

<body>

  <div class="stats-wrapper">

    <!-- Projects Completed -->
    <div class="stat-item">
      <div class="icon">
        <!-- Coffee cup icon -->
        <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
          <!-- Steam lines -->
          <rect x="20" y="4" width="3" height="8" rx="1.5" />
          <rect x="30" y="2" width="3" height="10" rx="1.5" />
          <!-- Cup body -->
          <path d="M10 20 h36 l-4 24 H14 Z" />
          <!-- Handle -->
          <path d="M46 24 h6 a6 6 0 0 1 0 12 h-6" fill="none" stroke="#c5cae9" stroke-width="4"
            stroke-linecap="round" />
          <!-- Saucer -->
          <rect x="6" y="46" width="44" height="4" rx="2" />
        </svg>
      </div>
      <span class="stat-number" data-target="4000"></span>
      <span class="stat-label">Project Completed</span>
    </div>

    <div class="stat-divider"></div>

    <!-- Happy Clients -->
    <div class="stat-item">
      <div class="icon">
        <!-- Group of people icon -->
        <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
          <!-- Center person head -->
          <circle cx="32" cy="16" r="8" />
          <!-- Center person body -->
          <path d="M18 48 c0-14 28-14 28 0" />
          <!-- Left person head -->
          <circle cx="14" cy="22" r="6" />
          <!-- Left person body -->
          <path d="M4 48 c0-10 20-10 20 0" />
          <!-- Right person head -->
          <circle cx="50" cy="22" r="6" />
          <!-- Right person body -->
          <path d="M40 48 c0-10 20-10 20 0" />
        </svg>
      </div>
      <span class="stat-number" data-target="15000"></span>
      <span class="stat-label">Our Happy Clients</span>
    </div>

    <div class="stat-divider"></div>

    <!-- Ongoing Projects -->
    <div class="stat-item">
      <div class="icon">
        <!-- Checklist icon -->
        <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
          <!-- Check marks -->
          <polyline points="6,14 10,18 16,10" fill="none" stroke="#c5cae9" stroke-width="3.5" stroke-linecap="round"
            stroke-linejoin="round" />
          <polyline points="6,32 10,36 16,28" fill="none" stroke="#c5cae9" stroke-width="3.5" stroke-linecap="round"
            stroke-linejoin="round" />
          <polyline points="6,50 10,54 16,46" fill="none" stroke="#c5cae9" stroke-width="3.5" stroke-linecap="round"
            stroke-linejoin="round" />
          <!-- Lines -->
          <rect x="22" y="12" width="36" height="4" rx="2" />
          <rect x="22" y="30" width="36" height="4" rx="2" />
          <rect x="22" y="48" width="36" height="4" rx="2" />
        </svg>
      </div>
      <span class="stat-number" data-target="500"></span>
      <span class="stat-label">OnGoing Projects</span>
    </div>
  </div>

  <script>
    const counters = document.querySelectorAll('.stat-number');
    //How to access your actual <div> elements
    counters.forEach((counter) => {
      counter.innerHTML = 0;
      //console.log(counter); // each div
      const updateCounter = () => {
        const targetValue = Number(counter.getAttribute('data-target'));
        console.log(targetValue); //typeof targetValue is String but we want value.

        const startingCoiunter = Number(counter.innerHTML);
        console.log(startingCoiunter);
        const increment = targetValue / 100; // control speed
        if (startingCoiunter < targetValue) {
          counter.innerText = Math.round(startingCoiunter + increment);
          setTimeout(updateCounter, 10);
        }
        else {
          counter.innerText = targetValue;
        }
      }
      updateCounter();
    });
  </script>
</body>
</html>
