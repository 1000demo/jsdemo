<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CRUD Operations</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            padding: 40px 24px;
            color: #e8e8f0;
            background-image:
                radial-gradient(ellipse 80% 60% at 20% 10%, rgba(99,60,180,0.18) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 80%, rgba(20,180,160,0.12) 0%, transparent 55%);
        }

        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-header h1 {
            font-family: 'Syne', sans-serif;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #c4b5fd, #5eead4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-header p {
            font-size: 13px;
            color: #6b6b80;
            margin-top: 6px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .container {
            display: flex;
            gap: 24px;
            align-items: flex-start;
            max-width: 1100px;
            margin: 0 auto;
            flex-wrap: wrap;
        }

        .card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 28px;
            flex: 1;
            min-width: 280px;
            backdrop-filter: blur(12px);
        }

        .card-title {
            font-family: 'Syne', sans-serif;
            font-size: 16px;
            font-weight: 600;
            color: #c4b5fd;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-title::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #5eead4;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b6b80;
            margin-bottom: 6px;
            margin-top: 16px;
        }

        label:first-of-type { margin-top: 0; }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #e8e8f0;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus {
            border-color: rgba(196,181,253,0.5);
            background: rgba(196,181,253,0.06);
        }

        input[type="text"]::placeholder,
        input[type="number"]::placeholder {
            color: #3a3a4a;
        }

        .form-action-button {
            display: flex;
            gap: 10px;
            margin-top: 22px;
        }

        input[type="submit"] {
            flex: 1;
            padding: 11px;
            background: linear-gradient(135deg, #7c3aed, #0d9488);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        input[type="submit"]:hover { opacity: 0.88; }
        input[type="submit"]:active { transform: scale(0.98); }

        input[type="reset"] {
            padding: 11px 18px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #6b6b80;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }

        input[type="reset"]:hover {
            background: rgba(255,255,255,0.1);
            color: #e8e8f0;
        }

        .table-wrap { overflow-x: auto; }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            min-width: 380px;
        }

        thead tr {
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        th {
            font-family: 'Syne', sans-serif;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #5eead4;
            padding: 10px 12px;
            text-align: left;
            background: transparent;
        }

        td {
            padding: 12px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            color: #c8c8d8;
            text-align: left;
        }

        tbody tr:hover td {
            background: rgba(255,255,255,0.03);
        }

        tbody tr:last-child td { border-bottom: none; }

        .actions { display: flex; gap: 6px; }

        button {
            padding: 5px 12px;
            border-radius: 6px;
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            border: none;
        }

        button:first-child {
            background: rgba(94,234,212,0.12);
            color: #5eead4;
            border: 1px solid rgba(94,234,212,0.25);
        }

        button:last-child {
            background: rgba(248,113,113,0.1);
            color: #f87171;
            border: 1px solid rgba(248,113,113,0.22);
        }

        button:hover { opacity: 0.75; }
        button:active { transform: scale(0.97); }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #3a3a4a;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="page-header">
        <h1>CRUD Operations</h1>
    </div>

    <div class="container">

        <!-- FORM -->
        <div class="card" style="max-width: 320px;">
            <div class="card-title">Add product</div>

            <form autocomplete="off" onsubmit="onFormSubmit(event)">
                <label>Product Code</label>
                <input type="text" name="productCode" id="productCode" placeholder="e.g. P001">

                <label>Product Name</label>
                <input type="text" name="productName" id="productName" placeholder="e.g. Wireless Mouse">

                <label>Qty</label>
                <input type="number" name="qty" id="qty" placeholder="0">

                <label>Price</label>
                <input type="number" name="perPrice" id="perPrice" placeholder="0.00">

                <div class="form-action-button">
                    <input type="submit" value="Submit">
                    <input type="reset" value="Reset">
                </div>
            </form>
        </div>

        <!-- TABLE -->
        <div class="card" style="flex: 2;">
            <div class="card-title">Product List</div>
            <div class="table-wrap">
                <table id="storeList">
                    <thead>
                        <tr>
                            <th>Code</th>
                            <th>Product Name</th>
                            <th>Qty</th>
                            <th>Price</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr id="emptyRow">
                            <td colspan="5" class="empty-state">No products yet. Add one to get started.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        var selectedRow = null;

        function onFormSubmit(event) {
            event.preventDefault();
            var formData = readFormData();
            if (!formData.productCode || !formData.productName || !formData.qty || !formData.perPrice) return;
            if (selectedRow === null) {
                insertNewRecord(formData);
            } else {
                updateRecord(formData);
            }
            resetForm();
        }

        function readFormData() {
            var formData = {};
            formData['productCode'] = document.getElementById('productCode').value.trim();
            formData['productName'] = document.getElementById('productName').value.trim();
            formData['qty']         = document.getElementById('qty').value.trim();
            formData['perPrice']    = document.getElementById('perPrice').value.trim();
            return formData;
        }

        function insertNewRecord(data) {
            var emptyRow = document.getElementById('emptyRow');
            if (emptyRow) emptyRow.remove();

            var table = document.getElementById('storeList').getElementsByTagName('tbody')[0];
            var newRow = table.insertRow(table.length);

            newRow.insertCell(0).innerHTML = data.productCode;
            newRow.insertCell(1).innerHTML = data.productName;
            newRow.insertCell(2).innerHTML = data.qty;
            newRow.insertCell(3).innerHTML = data.perPrice;

            var actCell = newRow.insertCell(4);
            actCell.innerHTML = '<div class="actions"><button onclick="onEdit(this)">Edit</button><button onclick="onDelete(this)">Delete</button></div>';
        }

        function onEdit(td) {
            selectedRow = td.closest('tr');
            document.getElementById('productCode').value = selectedRow.cells[0].innerHTML;
            document.getElementById('productName').value = selectedRow.cells[1].innerHTML;
            document.getElementById('qty').value          = selectedRow.cells[2].innerHTML;
            document.getElementById('perPrice').value    = selectedRow.cells[3].innerHTML;
        }

        function updateRecord(formData) {
            selectedRow.cells[0].innerHTML = formData.productCode;
            selectedRow.cells[1].innerHTML = formData.productName;
            selectedRow.cells[2].innerHTML = formData.qty;
            selectedRow.cells[3].innerHTML = formData.perPrice;
        }

        function onDelete(td) {
            if (confirm("Do you want to delete this record?")) {
                var row = td.closest('tr');
                document.getElementById('storeList').deleteRow(row.rowIndex);
                var tbody = document.getElementById('storeList').getElementsByTagName('tbody')[0];
                if (tbody.rows.length === 0) {
                    var tr = tbody.insertRow();
                    tr.id = 'emptyRow';
                    tr.insertCell(0).colSpan = 5;
                    tr.cells[0].className = 'empty-state';
                    tr.cells[0].textContent = 'No products yet. Add one to get started.';
                }
            }
            resetForm();
        }

        function resetForm() {
            document.getElementById('productCode').value = '';
            document.getElementById('productName').value = '';
            document.getElementById('qty').value          = '';
            document.getElementById('perPrice').value    = '';
            selectedRow = null;
        }
    </script>

</body>
</html>
