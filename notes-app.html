<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes App</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Poppins", sans-serif;
      background: #f5f6fa;
    }

    /* Header */
    .heading {
      background: #4a69bd;
      color: #fff;
      padding: 1rem 2rem;
      font-size: 1.4rem;
      font-weight: 500;
    }

    /* Add Button */
    .add-btn {
      position: fixed;
      top: 80px;
      right: 20px;
      background: #4a69bd;
      color: #fff;
      border: none;
      padding: 10px 18px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .add-btn:hover {
      background: #3b55a0;
    }

    /* Notes Container */
    .note-container {
      padding: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
    }

    /* Note Card */
    .note {
      width: 250px;
      background: #fff;
      border-radius: 8px;
      padding: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .main {
      font-size: 14px;
      color: #333;
      min-height: 80px;
      margin-bottom: 10px;
      white-space: pre-wrap;
    }

    textarea {
      width: 100%;
      height: 80px;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 8px;
      font-family: inherit;
      resize: none;
    }

    textarea:focus {
      outline: none;
      border-color: #4a69bd;
    }

    /* Buttons */
    .opeartion {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .opeartion button {
      border: none;
      cursor: pointer;
      padding: 6px 8px;
      border-radius: 5px;
      color: #fff;
      font-size: 12px;
    }

    .edit {
      background: #2ecc71;
    }

    .delete {
      background: #e74c3c;
    }

    .edit:hover {
      background: #27ae60;
    }

    .delete:hover {
      background: #c0392b;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

  <!-- Header -->
  <div class="heading">📝 My Notes</div>

  <!-- Add Button -->
  <button class="add-btn" id="add">+ Add Note</button>

  <!-- Notes Container -->
  <div class="note-container"></div>


  <!-- JS (UNCHANGED) -->
  <script>

    const addButton = document.querySelector('#add');

    const updateLSData = () => {
      const textareaData = document.querySelectorAll('textarea');
      const notes = [];

      textareaData.forEach((note) => {
        return notes.push(note.value);
      });

      localStorage.setItem('notes', JSON.stringify(notes));
    }

    const addNewNote = (text = '') => {
      const note = document.createElement('div');
      note.classList.add('note');

      const htmlData = `<div class="opeartion">
        <button class="fa-edit fas fa-pen edit"></button>
        <button class="fa-trash-alt fas fa-trash delete"></button>
      </div>
      <div class="main ${text ? '' : 'hidden'}"></div>
      <textarea class="${text ? 'hidden' : ''}"></textarea>`;

      note.insertAdjacentHTML('afterbegin', htmlData);

      const editButton = note.querySelector('.edit');
      const deleteButton = note.querySelector('.delete');
      const mainDiv = note.querySelector('.main');
      const textarea = note.querySelector('textarea');

      textarea.value = text;
      mainDiv.innerHTML = text;

      deleteButton.addEventListener('click', () => {
        note.remove();
        updateLSData();
      });

      editButton.addEventListener('click', () => {
        mainDiv.classList.toggle('hidden');
        textarea.classList.toggle('hidden');
      });

      textarea.addEventListener('change', (event) => {
        const value = event.target.value;
        mainDiv.innerHTML = value;
        updateLSData();
      });

      document.querySelector('.note-container').appendChild(note);
    }

    const notes = JSON.parse(localStorage.getItem('notes'));

    if (notes) {
      notes.forEach((note) => {
        addNewNote(note);
      });
    }

    addButton.addEventListener('click', () => {
      addNewNote();
    });

  </script>

</body>

</html>
