<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Functionality</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            margin: 0;
            padding: 20px;
        }

        /* Search Box */
        .search-wrapper {
            max-width: 500px;
            margin: 0 auto 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .search-wrapper label {
            font-weight: bold;
            color: #333;
        }

        .search {
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            font-size: 14px;
            transition: 0.3s;
        }

        .search:focus {
            border-color: #4a90e2;
            box-shadow: 0 0 5px rgba(74, 144, 226, 0.3);
        }

        /* Cards Container */
        .usercards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            max-width: 900px;
            margin: auto;
        }

        /* Card Design */
        .card {
            background: white;
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            transition: 0.2s ease;
            border: 1px solid #eee;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.1);
        }

        .card .header {
            font-size: 16px;
            font-weight: bold;
            color: #222;
            margin-bottom: 6px;
        }

        .card .body {
            font-size: 13px;
            color: #666;
        }

        /* Not Found Message */
        #not-found {
            text-align: center;
            margin-top: 20px;
            font-size: 16px;
            color: #e74c3c;
        }
    </style>
</head>

<body>

    <div class="search-wrapper">
        <label for="search">Search Users</label>
        <input type="search" id="search" class="search">
    </div>


    <div class="usercards"></div>
    <p id="not-found" style="display:none; color:red; margin-top:10px;">
        No users found
    </p>
    <script>
        let searchInput = document.querySelector('.search');
        let usercards = document.querySelector('.usercards');

        let users = []; // store API data

        async function getUser() {
            const response = await fetch('https://jsonplaceholder.typicode.com/users/');
            users = await response.json();

            displayUsers(users);
        }

        function displayUsers(data) {
            let innerHTML = '';

            data.forEach(user => {
                innerHTML += `
                <div class="card">
                    <div class="header">${user.username}</div>
                    <div class="body">${user.email}</div>
                </div>`;
            });

            usercards.innerHTML = innerHTML;
        }

        // 🔍 SEARCH
        searchInput.addEventListener('input', (e) => {
            const value = e.target.value.toLowerCase();
            const filteredUsers = users.filter(user => {
                return user.username.toLowerCase().includes(value) ||
                    user.email.toLowerCase().includes(value);
            });

            displayUsers(filteredUsers);
            // ✅ SHOW / HIDE MESSAGE
            const notFound = document.getElementById('not-found');

            if (filteredUsers.length === 0 && value !== '') {
                notFound.style.display = 'block';
            } else {
                notFound.style.display = 'none';
            }
        });

        getUser();
    </script>

</body>

</html>
