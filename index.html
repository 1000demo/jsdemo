<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Projects</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .project {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      transition: 0.3s;
    }

    .project:hover {
      background: #334155;
    }

    .project-name {
      font-size: 18px;
      font-weight: bold;
    }

    .project-link {
      margin-top: 5px;
    }

    .project-link a {
      color: #38bdf8;
      text-decoration: none;
    }

    .project-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <h1>My Projects</h1>

  <div class="project">
    <div class="project-name">Search Functionality</div>
    <div class="project-link">
      <a href="https://1000demo.github.io/jsdemo/search1.html" target="_blank">View Project</a>
    </div>
  </div>

  <div class="project">
    <div class="project-name">Employee Tracker</div>
    <div class="project-link">
      <a href="https://your-link.com" target="_blank">View Project</a>
    </div>
  </div>

  <!-- Add more projects like this -->
  
</body>
</html>
